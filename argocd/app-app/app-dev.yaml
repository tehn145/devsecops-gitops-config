apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devsecops-dev
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Huycon2352/Devsecops.git
    targetRevision: main
    path: k8s/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: devsecops-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
