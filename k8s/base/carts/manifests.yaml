apiVersion: v1
kind: ServiceAccount
metadata:
  name: carts
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: carts-config
data:
  DYNAMODB_ENDPOINT: http://dynamodb:8000
---
apiVersion: v1
kind: Service
metadata:
  name: dynamodb
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: dynamodb
---
apiVersion: v1
kind: Service
metadata:
  name: carts
spec:
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: carts
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: carts
spec:
  replicas: 1
  selector:
    matchLabels:
      app: carts
  template:
    metadata:
      labels:
        app: carts
    spec:
      serviceAccountName: carts
      containers:
        - name: carts
          image: ghcr.io/huycon2352/carts:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: carts-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynamodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dynamodb
  template:
    metadata:
      labels:
        app: dynamodb
    spec:
      containers:
        - name: dynamodb
          image: amazon/dynamodb-local:latest
          ports:
            - containerPort: 8000
